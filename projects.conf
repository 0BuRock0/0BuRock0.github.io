# projects.conf
# One entry per line, pipe-separated, 5 fields:
#   github_url | slug | branch | image_dir_in_repo | type
#
# github_url        - full https URL to the GitHub repo
# slug              - folder name to use under content/<type>/ (no spaces)
# branch             - branch to pull from (usually main or master)
# image_dir_in_repo  - path INSIDE the repo where README images live
#                       use "." if images sit at the repo root
# type               - "projects" or "writeups" — which content section this goes in
#
# Lines starting with # are ignored. Delete these examples and add your own.

